<div class="page-wrap">

  <div class="page-header">
    <h1>🏆 Premios del Mundial 2026</h1>
    <p>
      Realiza tus predicciones para los premios individuales y colectivos.
    </p>
  </div>

  <div class="cards-grid">

    @for (premio of premios(); track premio.id) {

  <div class="premio-card" [class.disabled-card]="bloqueado()">

    <div class="card-top">
      <div class="icon">
        {{ premio.icono }}
      </div>

      <div>
        <h3>{{ premio.titulo }}</h3>
        <p>{{ premio.descripcion }}</p>
      </div>

      <div class="puntos-chip">
        🏆 {{ premio.puntos }} pts
      </div>
    </div>

    <div class="card-body">
      </div>

        <div class="card-body">
          <label for="input-{{premio.id}}">
            Tu elección
          </label>

          <input
            id="input-{{premio.id}}"
            type="text"
            [(ngModel)]="premio.valor"
            [disabled]="bloqueado()"
            placeholder="{{ bloqueado() ? 'Predicciones cerradas' : 'Escribe tu predicción...' }}" />
        </div>

      </div>

    }

  </div>

  <div class="actions">
    <button
      class="btn-save"
      [disabled]="guardando() || bloqueado()"
      (click)="guardar()">

      @if (bloqueado()) {
        🔒 Predicciones Cerradas
      } @else {
        {{ guardando() ? 'Guardando...' : '💾 Guardar / Actualizar' }}
      }

    </button>
  </div>

</div>
